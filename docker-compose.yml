version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: facturatrs-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_pwd}
      POSTGRES_DB: ${DB_NAME:-facturatrs}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Exponemos el puerto de PostgreSQL solo a localhost por seguridad.
      # Así no queda expuesto al internet exterior en el VPS.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-facturatrs}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: facturatrs-api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Sobrescribimos el DATABASE_URL para que apunte al contenedor de la base de datos
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_pwd}@db:5432/${DB_NAME:-facturatrs}?schema=public
    # Se ejecuta db push para asegurar que la estructura esté sincronizada al arrancar
    command: sh -c "npx prisma db push && node dist/app.js"

volumes:
  postgres_data:
    driver: local
